conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = '#e6e6e6',
    default_outline_color = '#CAA9FA',
    default_shade_color = '#9AEDFE',
    color1 = '#50FA7B',
    color2 = '#FF79C6',
    color3 = '#BD93F9',
    color4 = '#FF6E67',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'JetBrainsMono Nerd Font:size=9',
    gap_x = 10,
    gap_y = 40,
    minimum_height = 220,
    maximum_width = 270,
    minimum_width = 270,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 190,
    own_window_type = 'desktop',
    own_window_hints ='undecorated,sticky,skip_taskbar,skip_pager,below',
    show_graph_range = false,
    short_units = true,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

conky.text = [[
${goto 4}${font adele:size=16:style:bold} ${time %A, %d %b}
${goto 20}${font LG Weather_Z:size=34}${time %I:%M}${font}
${image ~/.config/conky/icons/line.png -p 146,2 -s 2x90}
${execi 300 ~/.config/conky/scripts/weather.sh}
${goto 20}${voffset -30}${font adele:size=18:style:bold}${execi 300 bat ~/.cache/conky-weather.json | jq .name}${font}
${goto 160}${voffset -90}${font adele:size=22:style:bold}${execi 300 bat ~/.cache/conky-weather.json | jq .main.temp | cut -c 1-2}°${font ADELE :size=13}C${font}
${image ~/.cache/conky-weather-icon.png -p 210,14 -s 55x55}
${goto 170}${voffset 20}${font adele:size=18:style:bold}${execi 300 bat ~/.cache/conky-weather.json | jq '.weather | .[] | .description'}${font}
${color1}${font ConkySymbols:size=20}t${font} ${voffset -10}GNU/Linux» $hr ${color}
${color1}${goto 35}OS     : ${color}${execi 86400 cat `ls -atr /etc/*-release | tail -2` | grep "DISTRIB_DESCRIPTION" | cut -d= -f2 |  sed 's/"//g'}
${color1}${goto 35}Kernel : ${color}$kernel en $machine
${color1}${goto 35}Uptime: ${color}$uptime_short
${color1}${font ConkySymbols:size=16}f${font} ${voffset -10} System» $hr${color}
${color1}${goto 35}Core 1: ${color}${freq_g 1}GHz ${alignr}${cpu cpu0}% ${color2}${cpubar cpu0 8,80}${color}
${color1}${goto 35}Core 2: ${color}${freq_g 2}GHz ${alignr}${cpu cpu1}% ${color2}${cpubar cpu1 8,80}${color}
${goto 35}${cpugraph cpu0 20,115 FF79C6 FF6E67 -t} ${cpugraph cpu1 20,115 FF79C6 FF6E67 -t}
${voffset -8}${color1}${font ConkySymbols:size=16}h${font} ${voffset -10} Temperature» $hr${color}
${color1}${goto 35}CPU : ${color}${exec sensors | grep 'temp1' | awk 'NR==1{print $2}'} ${alignr}${color1}GPU : ${color}${exec sensors | grep 'temp1' | awk 'NR==2{print $2}'}
${color1}${font ConkySymbols:size=16}J${font} ${voffset -10}Memory» $hr${color}
${color1}${goto 35}RAM : ${color}$mem/$memmax ${alignr}$memperc% ${color2} ${membar 8,80}${color}
${color1}${goto 35}SWAP: ${color}$swap/$swapmax  ${alignr}$swapperc% ${color2}${swapbar 8,80}${color}
${color1}${font ConkySymbols:size=16}n${font} ${voffset -10} Processes» ${color}${color1}${goto 185}CPU ${alignr 6}Mem${color}
${voffset -8}${color1}${goto 35}${stippled_hr}${color}
${goto 35}${top name 1}${color}${goto 170}${top cpu 1}% ${alignr}${top mem 1}
${goto 35}${top name 2}${color}${goto 170}${top cpu 2}% ${alignr}${top mem 2}
${goto 35}${top name 3}${color}${goto 170}${top cpu 3}% ${alignr}${top mem 3}
${goto 35}${top name 4}${color}${goto 170}${top cpu 4}% ${alignr}${top mem 4}
${voffset -2}${color1}${goto 35}Memory Usage» ${color}${color1}${goto 135}${stippled_hr}${color}
${goto 35}${top_mem name 1}${alignr}${top_mem mem_res 1}
${goto 35}${top_mem name 2}${alignr}${top_mem mem_res 2}
${goto 35}${top_mem name 3}${alignr}${top_mem mem_res 3}
${goto 35}${top_mem name 4}${alignr}${top_mem mem_res 4}
${color1}${goto 35}Procesos: ${color}$processes ${goto 150} ${color1}Ejecutando: ${color}$running_processes
${color1}${font ConkySymbols:size=16}k${font} ${voffset -10} Storage» $hr${color}
${color1}${goto 35}Root : ${color}${fs_used /}/${fs_size /} ${alignr}${fs_used_perc /}% ${color2}${fs_bar 8,70 /}${color}
${color1}${goto 35}Home : ${color}${fs_used /home}/${fs_size /home} ${alignr}${fs_used_perc /home}% ${color2}${fs_bar 8,70 /home}${color}
${color1}${goto 35}mnt : ${color}${fs_used /mnt}/${fs_size /mnt} ${alignr}${fs_used_perc /mnt}% ${color2}${fs_bar 8,70 /mnt}${color}
${if_existing /proc/net/route wlan0}${color1}${font ConkySymbols:size=16}b${font} ${voffset -10} Wireless» $hr${color}
${color1}${goto 35}SSID : ${color}${wireless_essid wlan0}  ${voffset 2}${alignr 3}${color2}${wireless_link_bar 8,80 wlan0} ${color}${wireless_link_qual_perc wlan0}%
${color1}${goto 35}Bitrate : ${color}${wireless_bitrate wlan0}
${color1}${goto 35}IP: ${color}${if_existing /proc/net/route wlan0}${addr wlan0}
#${color1}${goto 35}External IP : ${color} ${exec curl -s www.icanhazip.com}
${goto 38} ${downspeed wlan0}/${totaldown wlan0} ${goto 160}  ${upspeed wlan0}/${totalup wlan0}
${voffset -4}${goto 35}${downspeedgraph wlan0 20,114 FF79C6 FF6E67} ${upspeedgraph wlan0 20,114 FF79C6 FF6E67}${voffset -120}${else}Red Desaconectada${endif}
]]
