conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'gray',
    default_outline_color = 'white',
    default_shade_color = 'white',
    color1 = '#1793d1',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'Roboto Mono:size=9',
    gap_x = 10,
    gap_y = 40,
    minimum_height = 220,
    maximum_width = 270,
    minimum_width = 270,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 190,
    own_window_type = 'desktop',
    own_window_hints ='undecorated,sticky,skip_taskbar,skip_pager,below',
    show_graph_range = false,
    short_units = true,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

conky.text = [[
${color1}${font ConkySymbols:size=20}t${font} ${voffset -10}GNU/Linux» $hr ${color}
${color1}${goto 35}OS     : ${color}${execi 86400 cat `ls -atr /etc/*-release | tail -2` | grep "PRETTY_NAME" | cut -d= -f2 |  sed 's/"//g'}
${color1}${goto 35}Kernel : ${color}$kernel en $machine
${color1}${goto 35}Uptime: ${color}$uptime_short
${color1}${goto 35}Load  : ${color}${loadavg}
${color1}${font ConkySymbols:size=16}f${font} ${voffset -10} System» $hr${color}
${color1}${goto 35}Core 1: ${color}${freq_g 1}GHz ${alignr}${cpu cpu0}% ${cpubar cpu0 8,80}
${color1}${goto 35}Core 2: ${color}${freq_g 2}GHz ${alignr}${cpu cpu1}% ${cpubar cpu1 8,80}
${goto 35}${cpugraph cpu0 20,115}  ${cpugraph cpu1 20,115}
${voffset -8}${color1}${font ConkySymbols:size=16}h${font} ${voffset -10} Temperature» $hr${color}
${color1}${goto 35}CPU : ${color}${exec sensors | grep 'temp1' | awk 'NR==1{print $2}'} ${alignr}${color1}GPU : ${color}${exec sensors | grep 'temp1' | awk 'NR==2{print $2}'}
${color1}${font ConkySymbols:size=16}J${font} ${voffset -10}Memory» $hr${color}
${color1}${goto 35}RAM : ${color}$mem/$memmax ${alignr}$memperc% 
${goto 35}${membar 8,235}
${color1}${goto 35}SWAP: ${color}$swap/$swapmax  ${alignr}$swapperc%
${goto 35}${swapbar 8,235}
${color1}${font ConkySymbols:size=16}n${font} ${voffset -10} Processes» $hr${color}
${voffset -2}${color1}${goto 35}CPU usage ${alignr}Memory Usage${color}
${voffset -8}${color1}${goto 35}${stippled_hr}${color}
${goto 35}${top name 1}${color}${goto 110}${top cpu 1}% ${goto 160}${top_mem name 1}${alignr}${top_mem mem_res 1}
${goto 35}${top name 2}${color}${goto 110}${top cpu 2}% ${goto 160}${top_mem name 2}${alignr}${top_mem mem_res 2}
${goto 35}${top name 3}${color}${goto 110}${top cpu 3}% ${goto 160}${top_mem name 3}${alignr}${top_mem mem_res 3}
${goto 35}${top name 4}${color}${goto 110}${top cpu 4}% ${goto 160}${top_mem name 4}${alignr}${top_mem mem_res 4}
${goto 35}${top name 5}${color}${goto 110}${top cpu 5}% ${goto 160}${top_mem name 5}${alignr}${top_mem mem_res 5}
${color1}${goto 35}Procesos: ${color}$processes ${goto 150} ${color1}Ejecutando: ${color}$running_processes
${color1}${font ConkySymbols:size=16}k${font} ${voffset -10} Storage» $hr${color}
${color1}${goto 35}Root : ${color}${fs_used /}/${fs_size /} ${alignr}${fs_used_perc /}% ${fs_bar 8,70 /}
${color1}${goto 35}Home : ${color}${fs_used /home}/${fs_size /home} ${alignr}${fs_used_perc /home}% ${fs_bar 8,70 /home}
${color1}${goto 35}mnt : ${color}${fs_used /mnt}/${fs_size /mnt} ${alignr}${fs_used_perc /mnt}% ${fs_bar 8,70 /mnt}
${color1}${font ConkySymbols:size=16}b${font} ${voffset -10} Wireless» $hr${color}
${color1}${goto 35}SSID : ${color}${wireless_essid wlp6s0}
${color1}${goto 35}Signal : ${color}${wireless_link_qual_perc wlp6s0}% ${voffset 2}${alignr}${wireless_link_bar 7,145 wlp6s0}
${color1}${goto 35}Bitrate : ${color}${wireless_bitrate wlp6s0}
${color1}${goto 35}Total Down/Up : ${color}${totaldown wlp6s0}/${totalup wlp6s0} 
${goto 35}Down : ${downspeed wlp6s0} ${goto 145}Up : ${upspeed wlp6s0}
${voffset -4}${goto 35}${downspeedgraph wlp6s0 20,115}  ${upspeedgraph wlp6s0 20,115}
]]
